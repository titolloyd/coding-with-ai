<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
</head>
<body>

    <h1>Tip Calculator</h1>

    <input type="number" id="bill" placeholder="Enter bill amount">

    <button onclick="calculateTip()">Calculate</button>

    <p id="result"></p>

    <script>
        function calculateTip() {
            let bill = document.getElementById("bill").value;
            let tip = bill * 0.15;
            let total = Number(bill) + tip;

            document.getElementById("result").innerHTML =
                "Tip: $" + tip.toFixed(2) +
                "<br>Total: $" + total.toFixed(2);
        }
    </script>

</body>
</html>

the webpage and why Number(bill) is necessary before adding the tip to the bill amount.
I also needed more explanation about how innerHTML updates and displays the results on the screen.-->
